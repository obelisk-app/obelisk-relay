    - "d9590d95a7811e1cb312be66edd664d7e3e6ed57822ad9f213ed620fc6748be8"

  max_subscriptions: 50
  max_limit: 500

  # Rate limits — relay is whitelisted so abuse risk is bounded by the
  # allowlist. Pre-existing default was 600/min per-connection, which throttles
  # legitimate admin bursts (group create + put_user + edit_metadata fire
  # several 9000-range events back-to-back). Match the public relay tuning.
  pubkey_rate_limit_per_minute: 6000
  connection_rate_limit_per_minute: 12000
  global_rate_limit_per_minute: 600000

  websocket:
    max_connection_duration: "24h"
    idle_timeout: "30m"
    max_connections: 300
