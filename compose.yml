services:
  groups_relay:
    # Prebuilt multi-arch image published by .github/workflows/docker.yml.
    # `docker compose pull groups_relay` fetches it (~30s) instead of compiling
    # from source. Override RELAY_IMAGE_TAG to pin a version (e.g. v1.2.3 or a
    # short SHA). Devs editing the relay can still build locally with:
    #   docker compose build groups_relay
    image: ghcr.io/obelisk-app/obelisk-relay:${RELAY_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./config:/app/config
      - relay-db:/app/db
    environment:
      RUST_LOG: "${RUST_LOG:-info}"
      NIP29__relay__relay_url: "wss://relay.obelisk.ar"
      TOKIO_BLOCKING_THREADS: "2048"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "5", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Public, unrestricted instance of the same relay binary, exposed via Cloudflare
  # tunnel as wss://public.obelisk.ar. Empty whitelist + 48h auto-prune + per-pubkey
  # rate limits — see public-config/settings.local.yml.
  public_relay:
    image: ghcr.io/obelisk-app/obelisk-relay:${RELAY_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./public-config:/app/config
      - public-relay-db:/app/db
      - ./public-config/branding/favicon.ico:/app/frontend/dist/favicon.ico:ro
      # Purple theme override: same filename hash as the baked CSS, so index.html
      # picks up our tinted variant without needing a frontend rebuild. If the
      # frontend bundle is rebuilt and the hash changes, regenerate this file.
      - ./public-config/branding/assets/index-DUXQZBvw.css:/app/frontend/dist/assets/index-DUXQZBvw.css:ro
    environment:
      RUST_LOG: "${RUST_LOG:-info}"
      NIP29__relay__relay_url: "wss://public.obelisk.ar"
      TOKIO_BLOCKING_THREADS: "2048"
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "5", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  relay-db:
  public-relay-db:
